name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - name: Install and build
        working-directory: obsidian-plugin
        run: |
          npm install
          npm run build

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version=$(node -p "require('./obsidian-plugin/manifest.json').version")
          if [ "$tag" != "$manifest_version" ]; then
            echo "Tag ($tag) does not match obsidian-plugin/manifest.json version ($manifest_version)" >&2
            exit 1
          fi

      - name: Verify root manifest.json + versions.json mirror plugin folder
        run: |
          if ! diff -q manifest.json obsidian-plugin/manifest.json > /dev/null; then
            echo "manifest.json at repo root is out of sync with obsidian-plugin/manifest.json" >&2
            exit 1
          fi
          if ! diff -q versions.json obsidian-plugin/versions.json > /dev/null; then
            echo "versions.json at repo root is out of sync with obsidian-plugin/versions.json" >&2
            exit 1
          fi

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: obsidian-plugin
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css
